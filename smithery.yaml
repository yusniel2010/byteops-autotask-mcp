# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - autotaskUsername
      - autotaskSecret
      - autotaskIntegrationCode
    properties:
      autotaskUsername:
        type: string
        description: Your Autotask API username (email address)
      autotaskSecret:
        type: string
        description: Your Autotask API secret key
      autotaskIntegrationCode:
        type: string
        description: Your Autotask integration code
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/entry.js'], env: { AUTOTASK_USERNAME: config.autotaskUsername, AUTOTASK_SECRET: config.autotaskSecret, AUTOTASK_INTEGRATION_CODE: config.autotaskIntegrationCode, MCP_TRANSPORT: 'stdio' } })
